<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form method="POST">
    <label for="title">
        Title:
        <input id="title" type="text" name="title" value="{{ product.title }}">
    </label>
    <label for="img">
        Img link:
        <input id="img" type="text" name="img" value="{{ product.img }}" >
    </label>
    <label for="price">
        Price:
        <input id="price" type="text" name="price" value="{{ product.price }}" >
    </label>
    <label for="description">
        Description:
        <textarea id="description" name="description" cols="30" rows="10">{{ product.description }}</textarea>
    </label>
    <button type="submit" >Submit</button>
</form>

</body>
</html>
